<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 Music Globe — 全球音乐灯塔</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#000010;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
  overflow:hidden;height:100vh;width:100vw;user-select:none;-webkit-user-select:none;
}
#globe-container{position:fixed;inset:0}

/* ═══════ 右上角浮窗 ═══════ */
#music-panel{
  position:fixed;top:20px;right:20px;width:320px;max-height:calc(100vh - 140px);
  background:rgba(8,8,28,.82);backdrop-filter:blur(20px) saturate(140%);
  -webkit-backdrop-filter:blur(20px) saturate(140%);
  border:1px solid rgba(255,255,255,.08);border-radius:16px;z-index:100;
  display:flex;flex-direction:column;overflow:hidden;
  opacity:0;transform:translateY(-10px) scale(.96);
  transition:all .4s cubic-bezier(.22,.61,.36,1);
  pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.5);
}
#music-panel.open{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.panel-header{padding:14px 16px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.05)}
.panel-title-group{display:flex;align-items:center;gap:8px}
.panel-flag{font-size:20px}
.panel-city{font-size:16px;font-weight:700;color:#fff}
.panel-country{font-size:11px;color:rgba(255,255,255,.35)}
.panel-close-btn{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.06);border:none;color:rgba(255,255,255,.4);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.panel-close-btn:hover{background:rgba(255,255,255,.14);color:#fff}
.platform-tabs{display:flex;gap:6px;padding:8px 14px}
.platform-tab{padding:5px 11px;font-size:10px;font-weight:600;color:rgba(255,255,255,.35);cursor:pointer;border-radius:20px;transition:all .2s;border:1px solid transparent}
.platform-tab:hover{color:rgba(255,255,255,.6)}
.platform-tab.active{color:#fff;background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.1)}
.track-list-wrapper{flex:1;overflow-y:auto;padding:0 8px 8px;max-height:320px}
.track-list-wrapper::-webkit-scrollbar{width:2px}
.track-list-wrapper::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:10px}
.track-item{display:flex;align-items:center;padding:8px 10px;border-radius:10px;gap:10px;cursor:pointer;transition:all .15s}
.track-item:hover{background:rgba(255,255,255,.05)}
.track-item:active{background:rgba(255,255,255,.08)}
.track-item.playing{background:rgba(100,200,255,.1);border:1px solid rgba(100,200,255,.15)}
.track-rank{width:22px;text-align:center;font-weight:700;font-size:12px;color:rgba(255,255,255,.25);flex-shrink:0}
.track-rank.top3{color:#ffd700}
.track-info{flex:1;min-width:0}
.track-name{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-artist{font-size:10px;color:rgba(255,255,255,.35);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-play-icon{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .2s}
.track-item:hover .track-play-icon{background:rgba(255,255,255,.15)}
.track-item.playing .track-play-icon{background:rgba(100,200,255,.25)}

/* ═══════ 底部播放器 ═══════ */
#player-bar{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(12,12,36,.88);backdrop-filter:blur(24px) saturate(140%);
  -webkit-backdrop-filter:blur(24px) saturate(140%);
  border:1px solid rgba(255,255,255,.06);border-radius:16px;
  padding:10px 18px;display:flex;align-items:center;gap:14px;z-index:100;
  opacity:0;transition:all .4s cubic-bezier(.22,.61,.36,1);
  pointer-events:none;min-width:360px;box-shadow:0 4px 24px rgba(0,0,0,.6);
}
#player-bar.active{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.player-info{flex:1;min-width:0;display:flex;align-items:center;gap:10px}
.player-cover{width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg,rgba(100,180,255,.2),rgba(80,120,200,.1));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.player-track-title{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-track-artist{font-size:11px;color:rgba(255,255,255,.35)}
.player-controls{display:flex;align-items:center;gap:10px}
.player-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.08);border:none;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.player-btn:hover{background:rgba(255,255,255,.15)}
.player-btn.play-btn{width:42px;height:42px;background:rgba(100,180,255,.2)}
.player-btn.play-btn:hover{background:rgba(100,200,255,.3)}
.player-volume-slider{-webkit-appearance:none;width:80px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;outline:none}
.player-volume-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;cursor:pointer}

.hint-badge{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:8px 20px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:20px;color:rgba(255,255,255,.3);font-size:12px;transition:opacity .5s;pointer-events:none;z-index:10}

.loading-dots{display:flex;gap:4px;align-items:center;justify-content:center;padding:20px}
.loading-dots span{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.2);animation:dot-bounce .6s ease-in-out infinite alternate}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot-bounce{to{transform:translateY(-6px);background:rgba(255,255,255,.5)}}

// ═══════════════ ⭐ 3D Lighthouse (Three.js) ⭐ ═══════════════
let lighthouseGroup = null;
let lighthouseAnimId = null;

function latLngToVec3(lat, lng, radius){
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lng + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -radius * Math.sin(phi) * Math.cos(theta),
     radius * Math.cos(phi),
     radius * Math.sin(phi) * Math.sin(theta)
  );
}

function createLighthouse(lat, lng){
  removeLighthouse();
  const R = globe.getGlobeRadius();
  lighthouseGroup = new THREE.Group();

  const pos = latLngToVec3(lat, lng, R);
  const dir = pos.clone().normalize();

  // ── 光柱底座 (大光点) ──
  const baseGeo = new THREE.SphereGeometry(0.6, 32, 32);
  const baseMat = new THREE.MeshBasicMaterial({color:'#ffffff',transparent:true,opacity:.9});
  const base = new THREE.Mesh(baseGeo, baseMat);
  base.position.copy(dir.clone().multiplyScalar(R + 0.3));
  lighthouseGroup.add(base);

  // ── 光柱主体 (圆柱) ──
  const beamH = 8;
  const beamGeo = new THREE.CylinderGeometry(0.12, 0.3, beamH, 16, 4, true);
  const beamMat = new THREE.MeshBasicMaterial({color:'#64c8ff',transparent:true,opacity:.35,depthWrite:false,side:THREE.DoubleSide});
  const beam = new THREE.Mesh(beamGeo, beamMat);
  beam.position.copy(dir.clone().multiplyScalar(R + beamH/2 + 0.5));
  beam.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
  lighthouseGroup.add(beam);

  // ── 外部光晕柱 ──
  const outerGeo = new THREE.CylinderGeometry(0.35, 0.55, beamH*1.2, 16, 4, true);
  const outerMat = new THREE.MeshBasicMaterial({color:'#4488cc',transparent:true,opacity:.12,depthWrite:false,side:THREE.DoubleSide});
  const outer = new THREE.Mesh(outerGeo, outerMat);
  outer.position.copy(dir.clone().multiplyScalar(R + beamH/2 + 0.4));
  outer.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
  lighthouseGroup.add(outer);

  // ── 顶部闪焰球 ──
  const tipGeo = new THREE.SphereGeometry(0.45, 32, 32);
  const tipMat = new THREE.MeshBasicMaterial({color:'#ffffff',transparent:true,opacity:.95});
  const tip = new THREE.Mesh(tipGeo, tipMat);
  tip.position.copy(dir.clone().multiplyScalar(R + beamH + 1.2));
  lighthouseGroup.add(tip);

  // ── 顶部光晕 ──
  const haloGeo = new THREE.SphereGeometry(0.9, 16, 16);
  const haloMat = new THREE.MeshBasicMaterial({color:'#88ccff',transparent:true,opacity:.25,depthWrite:false});
  const halo = new THREE.Mesh(haloGeo, haloMat);
  halo.position.copy(dir.clone().multiplyScalar(R + beamH + 1.2));
  lighthouseGroup.add(halo);

  // ── 扩散光环 (3层) ──
  for(let i=0;i<3;i++){
    const ringGeo = new THREE.TorusGeometry(1.3 + i*1.0, 0.04, 8, 48);
    const ringMat = new THREE.MeshBasicMaterial({color:'#64c8ff',transparent:true,opacity:.4 - i*.12,depthWrite:false});
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.copy(dir.clone().multiplyScalar(R + 0.1));
    ring.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
    ring.userData = {baseScale:1, phase:i*0.7};
    lighthouseGroup.add(ring);
  }

  // ── 上升粒子 ──
  const pCount = 80;
  const pGeo = new THREE.BufferGeometry();
  const pPos = new Float32Array(pCount*3);
  for(let i=0;i<pCount;i++){
    const t = Math.random();
    const p = dir.clone().multiplyScalar(R + 1 + t*beamH);
    p.x += (Math.random()-.5)*3;
    p.y += (Math.random()-.5)*3;
    p.z += (Math.random()-.5)*3;
    pPos[i*3]=p.x; pPos[i*3+1]=p.y; pPos[i*3+2]=p.z;
  }
  pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
  const pMat = new THREE.PointsMaterial({color:'#aaddff',size:.15,transparent:true,opacity:.7,depthWrite:false,blending:THREE.AdditiveBlending});
  const particles = new THREE.Points(pGeo, pMat);
  lighthouseGroup.add(particles);

  globe.scene().add(lighthouseGroup);

  // ── 动画 ──
  const rings = lighthouseGroup.children.filter(c=>c.geometry?.type==='TorusGeometry');
  const start = performance.now();
  (function anim(now){
    const t = (now-start)/1000;
    beam.material.opacity = .3 + Math.sin(t*2)*.1;
    outer.material.opacity = .1 + Math.sin(t*1.5)*.05;
    tip.material.opacity = .85 + Math.sin(t*3)*.15;
    halo.material.opacity = .2 + Math.sin(t*2.5)*.1;
    base.material.opacity = .8 + Math.sin(t*2)*.2;

    rings.forEach((r,i)=>{
      const s = r.userData.baseScale + Math.sin(t*2.5 + r.userData.phase)*0.25;
      r.scale.setScalar(s);
      r.material.opacity = .35 - i*.1 + Math.sin(t*3 + r.userData.phase)*.15;
    });

    // 粒子浮动
    const posArr = particles.geometry.attributes.position.array;
    for(let i=0;i<pCount;i++){
      posArr[i*3+1] += Math.sin(t*4 + i*.3)*.015;
      posArr[i*3] += Math.cos(t*3 + i*.4)*.01;
    }
    particles.geometry.attributes.position.needsUpdate = true;

    lighthouseAnimId = requestAnimationFrame(anim);
  })(start);
}

function removeLighthouse(){
  if(lighthouseGroup){globe.scene().remove(lighthouseGroup);lighthouseGroup=null}
  if(lighthouseAnimId){cancelAnimationFrame(lighthouseAnimId);lighthouseAnimId=null}
}

// ═══════════════ Spotify OAuth (PKCE) ═══════════════
const SPOTIFY_CLIENT_ID = '1f6545fb0837407cb6181f50d8a4cd71';
const SPOTIFY_REDIRECT = 'https://shinypideng.github.io/music-globe/';
let spotifyToken = localStorage.getItem('spotify_token') || null;

function generateCodeVerifier(){
  const arr = new Uint8Array(64); crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'').substring(0,128);
}
async function generateCodeChallenge(verifier){
  const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
  return btoa(String.fromCharCode(...new Uint8Array(hash))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function spotifyLogin(){
  try {
  if(currentCity) localStorage.setItem('last_city', currentCity.id);
  const verifier = generateCodeVerifier();
  localStorage.setItem('spotify_verifier', verifier);
  const challenge = await generateCodeChallenge(verifier);
  const params = new URLSearchParams({
    client_id: SPOTIFY_CLIENT_ID,
    response_type: 'code',
    redirect_uri: SPOTIFY_REDIRECT,
    code_challenge_method: 'S256',
    code_challenge: challenge,
    scope: 'user-read-private',
  });
  window.location.href = 'https://accounts.spotify.com/authorize?' + params;
  } catch(e) { alert('Spotify 登录失败: ' + e.message); console.error(e); }
}
window.spotifyLogin = spotifyLogin;

async function spotifyHandleCallback(){
  const code = new URLSearchParams(window.location.search).get('code');
  if(!code) return false;
  // Clean URL
  window.history.replaceState({}, '', SPOTIFY_REDIRECT);
  const verifier = localStorage.getItem('spotify_verifier');
  const resp = await fetch('https://accounts.spotify.com/api/token', {
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body: new URLSearchParams({
      client_id: SPOTIFY_CLIENT_ID,
      grant_type: 'authorization_code',
      code, redirect_uri: SPOTIFY_REDIRECT,
      code_verifier: verifier,
    })
  });
  const data = await resp.json();
  if(data.access_token){
    spotifyToken = data.access_token;
    localStorage.setItem('spotify_token', spotifyToken);
    localStorage.setItem('spotify_expires', Date.now() + (data.expires_in||3600)*1000);
    return true;
  }
  return false;
}

async function spotifyFetch(endpoint){
  if(!spotifyToken) return null;
  // Check expiry
  const exp = localStorage.getItem('spotify_expires');
  if(exp && Date.now() > parseInt(exp)){ spotifyToken=null; localStorage.removeItem('spotify_token'); return null; }
  try{
    const r = await fetch('https://api.spotify.com/v1'+endpoint, {headers:{Authorization:'Bearer '+spotifyToken}});
    if(r.status===401){spotifyToken=null;localStorage.removeItem('spotify_token');return null}
    return await r.json();
  }catch(e){return null}
}

// Country to Spotify market code + playlist search
const SPOTIFY_MARKETS = {
  tokyo:'JP',seoul:'KR',shanghai:'CN',hongkong:'HK',taipei:'TW',mumbai:'IN',
  bangkok:'TH',london:'GB',paris:'FR',berlin:'DE',stockholm:'SE',
  newyork:'US',losangeles:'US',mexicocity:'MX',saopaulo:'BR',buenosaires:'AR',
  lagos:'NG',johannesburg:'ZA',sydney:'AU'
};

async function spotifyGetTopTracks(cityId){
  const market = SPOTIFY_MARKETS[cityId]||'US';
  // Search for top playlists in this market
  const result = await spotifyFetch(`/search?q=Top+50&type=playlist&market=${market}&limit=5`);
  if(!result?.playlists?.items?.length) return null;
  // Get first playlist's tracks
  const pl = result.playlists.items[0];
  const tracks = await spotifyFetch(`/playlists/${pl.id}/tracks?limit=10&market=${market}`);
  if(!tracks?.items) return null;
  return tracks.items.slice(0,10).map((item,i)=>({
    rank:i+1,
    title:item.track?.name||'?',
    artist:item.track?.artists?.map(a=>a.name).join(', ')||'?',
    album:item.track?.album?.name||'',
    cover:item.track?.album?.images?.[0]?.url||'',
    preview:item.track?.preview_url||null,
  }));
}
let audio = null;
let currentTrack = null;
let isPlaying = false;

async function playTrack(track, cityId){
  if(audio){audio.pause();audio=null}
  currentTrack = {...track,cityId}; isPlaying = false;

  const cover = document.getElementById('player-cover');
  cover.textContent = '🎵'; cover.style.backgroundImage='';
  document.getElementById('player-title').textContent = track.title;
  document.getElementById('player-artist').textContent = track.artist;
  document.getElementById('player-bar').classList.add('active');
  document.getElementById('btn-play').textContent = '⏳';

  // Highlight playing track
  document.querySelectorAll('.track-item').forEach(el=>el.classList.remove('playing'));
  document.querySelectorAll('.track-item').forEach(el=>{
    if(el.querySelector('.track-name')?.textContent === track.title) el.classList.add('playing');
  });

  // If Spotify preview URL available, use it directly
  if(track.preview){
    audio = new Audio(track.preview);
    audio.volume = document.getElementById('volume-slider').value/100;
    audio.onended = ()=>{isPlaying=false;updatePlayBtn()};
    document.getElementById('btn-play').textContent = '▶';
    return;
  }

  // Try iTunes API for preview
  const cmap={tokyo:'jp',seoul:'kr',shanghai:'cn',hongkong:'hk',taipei:'tw',mumbai:'in',bangkok:'th',london:'gb',paris:'fr',berlin:'de',stockholm:'se',newyork:'us',losangeles:'us',mexicocity:'mx',saopaulo:'br',buenosaires:'ar',lagos:'ng',johannesburg:'za',sydney:'au'};
  try{
    const q = encodeURIComponent(`${track.artist} ${track.title}`.replace(/[·×/()（）]/g,' ').replace(/\s+/g,'+'));
    const r = await fetch(`https://itunes.apple.com/search?term=${q}&country=${cmap[cityId]||'us'}&limit=5&media=music`);
    const d = await r.json();
    if(d.results?.length>0){
      // Try to find best match
      let best = d.results[0];
      for(const m of d.results){
        const t = (m.trackName||'').toLowerCase();
        const keywords = track.title.toLowerCase().split(/\s+/).filter(w=>w.length>1);
        if(keywords.some(k=>t.includes(k))){best=m;break}
      }
      if(best.previewUrl){
        audio = new Audio(best.previewUrl);
        audio.volume = document.getElementById('volume-slider').value/100;
        audio.onended = ()=>{isPlaying=false;updatePlayBtn()};
        audio.oncanplaythrough = ()=>{document.getElementById('btn-play').textContent='▶';};
        document.getElementById('btn-play').textContent = '⏳';
        if(best.artworkUrl100){
          cover.style.backgroundImage=`url(${best.artworkUrl100.replace('100x100','300x300')})`;
          cover.style.backgroundSize='cover';cover.textContent='';
        }
        return;
      }
    }
  }catch(e){console.log('iTunes fetch failed:',e.message)}

  document.getElementById('btn-play').textContent = '🔇';
  setTimeout(()=>{if(!audio)document.getElementById('btn-play').textContent='▶'},2500);
}

function togglePlay(){
  if(!audio){if(currentTrack)playTrack(currentTrack,currentTrack.cityId);return}
  if(isPlaying){audio.pause();isPlaying=false}else{audio.play();isPlaying=true}
  updatePlayBtn();
}
function updatePlayBtn(){document.getElementById('btn-play').textContent=isPlaying?'⏸':'▶'}
function setVolume(v){if(audio)audio.volume=v/100}

// ═══════════════ 面板 ═══════════════
const panel = document.getElementById('music-panel');
const hintBadge = document.getElementById('hint-badge');
let currentCity = null;
let currentPlatform = 'spotify';

function selectCity(city){
  currentCity=city;
  globe.controls().autoRotate=false;
  globe.pointOfView({lat:city.lat,lng:city.lng,altitude:1.4},1000);
  setTimeout(()=>createLighthouse(city.lat,city.lng),500);

  document.getElementById('panel-flag').textContent=city.flag;
  document.getElementById('panel-city').textContent=city.nameCN;
  document.getElementById('panel-country').textContent=city.name;
  currentPlatform='spotify';
  document.querySelectorAll('.platform-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('[data-platform="spotify"]').classList.add('active');
  renderTracks(city.id);
  panel.classList.add('open');
  hintBadge.style.opacity='0';
}

function closePanel(){
  panel.classList.remove('open');removeLighthouse();
  currentCity=null;globe.controls().autoRotate=true;
  hintBadge.style.opacity='1';
}
window.closePanel=closePanel;

async function renderTracks(cid){
  const c=document.getElementById('track-list');
  c.innerHTML='<div class="loading-dots"><span></span><span></span><span></span></div>';

  // If Spotify tab + connected, fetch real data
  if(currentPlatform==='spotify' && spotifyToken){
    const real = await spotifyGetTopTracks(cid);
    if(real?.length){
      const pt=currentTrack&&currentTrack.cityId===cid;
      c.innerHTML=real.map((t,i)=>`<div class="track-item${pt&&currentTrack&&currentTrack.title===t.title?' playing':''}" onclick="playTrack({title:'${t.title.replace(/'/g,"\\'")}',artist:'${t.artist.replace(/'/g,"\\'")}',rank:${t.rank},preview:'${t.preview||''}'},'${cid}')"><div class="track-rank ${i<3?'top3':''}">${t.rank}</div><div class="track-info"><div class="track-name">${t.title}</div><div class="track-artist">${t.artist}</div></div><div class="track-play-icon">${t.preview?'▶':'🔇'}</div></div>`).join('');
      return;
    }
  }

  // Fallback: mock data
  setTimeout(()=>{
    const tracks=getTracks(cid);
    const pt=currentTrack&&currentTrack.cityId===cid;
    c.innerHTML=tracks.map(t=>`<div class="track-item${pt&&currentTrack&&currentTrack.title===t.title?' playing':''}" onclick="playTrack({title:'${t.title.replace(/'/g,"\\'")}',artist:'${t.artist.replace(/'/g,"\\'")}',rank:${t.rank}},'${cid}')"><div class="track-rank ${t.rank<=3?'top3':''}">${t.rank}</div><div class="track-info"><div class="track-name">${t.title}</div><div class="track-artist">${t.artist}</div></div><div class="track-play-icon">▶</div></div>`).join('');
  },200);
}

document.getElementById('platform-tabs').addEventListener('click',e=>{
  const tab=e.target.closest('.platform-tab');
  if(!tab||!currentCity)return;
  document.querySelectorAll('.platform-tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');currentPlatform=tab.dataset.platform;
  renderTracks(currentCity.id);
});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&panel.classList.contains('open'))closePanel()});
globeEl.addEventListener('pointerdown',()=>{
  if(!panel.classList.contains('open')){hintBadge.style.opacity='.15';setTimeout(()=>{if(!panel.classList.contains('open'))hintBadge.style.opacity='1'},3000)}
});
